<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kitchen Assistant</title>
  <style>
    :root {
      --bg: #14161a; --panel: #1e2128; --text: #e8e6e3; --muted: #8a8f98;
      --accent: #e8863a; --user: #2c3440; --agent: #26303b; --err: #c0392b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.45 system-ui, sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: var(--panel);
    }
    header h1 { font-size: 16px; margin: 0; flex: 1; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted); transition: background .2s;
    }
    #status-dot.ready { background: #2ecc71; }
    #status-dot.reconnecting { background: var(--accent); }
    #status-text { color: var(--muted); font-size: 13px; }
    #timers { display: flex; gap: 8px; padding: 8px 16px; flex-wrap: wrap; min-height: 24px; }
    .timer-chip {
      background: var(--panel); border: 1px solid var(--accent);
      border-radius: 14px; padding: 3px 12px; font-size: 13px;
    }
    .timer-chip.expired { border-color: var(--err); color: var(--err); }
    #transcript { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .line { margin: 6px 0; padding: 8px 12px; border-radius: 8px; max-width: 80%; white-space: pre-wrap; }
    .line.user { background: var(--user); margin-left: auto; }
    .line.agent { background: var(--agent); }
    .line.error { background: var(--err); }
    footer { display: flex; gap: 8px; padding: 12px 16px; background: var(--panel); }
    #mic-btn {
      border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 15px; font-weight: 600;
    }
    #mic-btn.live { background: var(--err); }
    #mic-btn:disabled { background: var(--muted); cursor: not-allowed; }
    #text-input {
      flex: 1; border: none; border-radius: 8px; padding: 10px 12px;
      background: var(--bg); color: var(--text); font-size: 15px;
    }
    #cam-btn {
      border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer;
      background: var(--panel); border: 1px solid var(--muted); color: var(--text); font-size: 15px;
    }
    #cam-btn.live { border-color: var(--accent); color: var(--accent); }
    #cam-btn:disabled { color: var(--muted); cursor: not-allowed; }
    #cam-preview {
      position: fixed; bottom: 70px; right: 16px; width: 160px; border-radius: 8px;
      border: 1px solid var(--accent); display: none; background: #000;
    }
    #cam-preview.live { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>🍳 Kitchen Assistant</h1>
    <span id="status-text">connecting…</span>
    <div id="status-dot"></div>
  </header>
  <div id="timers"></div>
  <main id="transcript"></main>
  <video id="cam-preview" autoplay muted playsinline></video>
  <footer>
    <button id="mic-btn" disabled>🎤 Start</button>
    <button id="cam-btn" disabled>📷 Camera</button>
    <input id="text-input" type="text" placeholder="Type to the sous-chef (or use the mic)…" autocomplete="off">
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
